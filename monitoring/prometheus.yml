global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'core-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['core:3001']

  - job_name: 'leaderboard-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['leaderboard-service:3002']

  - job_name: 'evaluation-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['evaluation-service:3003']

  - job_name: 'evaluation-service-go'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['evaluation-service-go:3004']
